name: CI

# Se ejecuta sobre Pull Requests y sobre push a las ramas de integración,
# más un disparador manual para reintentos ad hoc. No hay ningún job de
# despliegue en este workflow.
on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:

# Cancela ejecuciones anteriores del mismo PR/rama cuando llega un push
# nuevo, para no gastar minutos de CI en resultados que ya quedaron
# obsoletos.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "24"
  # Debe coincidir con "packageManager" en package.json. actions/setup-node
  # no fija versión de npm por sí solo — usa la que venga empaquetada con el
  # Node.js resuelto, que avanza con el tiempo. Sin este pin, `npm ci` puede
  # fallar más adelante con "Missing: ... from lock file" apenas una versión
  # de npm más nueva resuelva una dependencia opcional transitiva distinta a
  # como quedó grabada en package-lock.json (pasó exactamente esto: faltaban
  # @emnapi/core@1.11.2 y @emnapi/runtime@1.11.2 — dependencias opcionales de
  # una native binding de Linux que npm 11.6.2 nunca resolvió en Windows,
  # pero un npm más nuevo en Linux sí).
  NPM_VERSION: "11.16.0"

jobs:
  # type-check + lint + Vitest: rápido, no necesita Docker/Supabase. El job
  # de e2e depende de este para no gastar tiempo levantando Playwright si
  # ya hay un error de tipos o de lint.
  checks:
    name: Type-check, lint y pruebas unitarias
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      # Caché del filesystem cache de Turborepo (.turbo/, ver .gitignore).
      # Turbo decide hit/miss por hash de contenido real, así que una clave
      # amplia con restore-keys como fallback es suficiente y segura: en el
      # peor caso (sin match) simplemente no acelera nada, nunca sirve un
      # resultado obsoleto.
      - name: Restaurar caché de Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Fijar la versión de npm (coincide con packageManager)
        run: npm install -g npm@${{ env.NPM_VERSION }}

      - name: Instalar dependencias (npm workspaces)
        run: npm ci

      - name: Type-check (tsc --noEmit en todos los paquetes)
        run: npm run type-check

      - name: Lint (ESLint)
        run: npm run lint

      - name: Pruebas unitarias (Vitest, con cobertura)
        run: npm run test -- -- --coverage

      - name: Publicar cobertura como artefacto
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-coverage
          path: |
            apps/web/coverage
            packages/*/coverage
          retention-days: 7
          if-no-files-found: ignore

  # E2E con Playwright, contra un stack de Supabase LOCAL y efímero
  # (levantado dentro del propio runner vía Supabase CLI + Docker, ya
  # preinstalado en los runners ubuntu-latest de GitHub). El usuario con el
  # que autentica e2e/tests/auth.spec.ts lo crea el global-setup de Playwright
  # vía Admin API (usando la SERVICE_ROLE_KEY del stack local), no el seed:
  # insertar filas en auth.users a mano no produce un usuario que GoTrue
  # acepte en signInWithPassword de forma fiable. No se necesita ningún
  # secreto: las claves que arroja `supabase status` para este stack son las
  # mismas para cualquier instancia local de Supabase en cualquier máquina, y
  # el stack completo se destruye con el runner al terminar el job.
  e2e:
    name: End-to-end (Playwright)
    runs-on: ubuntu-latest
    needs: checks
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Restaurar caché de Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Fijar la versión de npm (coincide con packageManager)
        run: npm install -g npm@${{ env.NPM_VERSION }}

      - name: Instalar dependencias (npm workspaces)
        run: npm ci

      # Solo Chromium en CI (mantiene el job rápido); Firefox y WebKit
      # quedan disponibles para correr localmente vía `npm run test:e2e`.
      - name: Restaurar caché de navegadores de Playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Instalar navegador de Playwright (Chromium)
        run: npx --prefix apps/web playwright install --with-deps chromium

      - name: Instalar Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Levantar Supabase local
        run: supabase start

      - name: Aplicar migraciones y datos sembrados (supabase/seed.sql)
        run: supabase db reset

      # Credenciales del stack local efímero de este job, no secretos del
      # proyecto: se leen dinámicamente en vez de fijarlas en el workflow.
      - name: Leer credenciales del Supabase local
        id: supabase
        run: |
          STATUS=$(supabase status -o json)
          echo "api_url=$(echo "$STATUS" | jq -r '.API_URL')" >> "$GITHUB_OUTPUT"
          echo "anon_key=$(echo "$STATUS" | jq -r '.ANON_KEY')" >> "$GITHUB_OUTPUT"
          echo "service_role_key=$(echo "$STATUS" | jq -r '.SERVICE_ROLE_KEY')" >> "$GITHUB_OUTPUT"

      - name: Ejecutar pruebas E2E
        working-directory: apps/web
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ steps.supabase.outputs.api_url }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ steps.supabase.outputs.anon_key }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ steps.supabase.outputs.service_role_key }}
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
        run: npx playwright test --project=chromium

      # playwright.config.ts ya agrega el reporter "github" cuando CI=true
      # (variable que Actions define automáticamente), así que los fallos
      # también quedan anotados directamente sobre el diff del PR sin nada
      # adicional aquí. Esto solo sube el reporte HTML + screenshots/video
      # como artefacto descargable, y solo cuando algo falló.
      - name: Publicar reporte de Playwright (solo si falló)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            apps/web/e2e/playwright-report
            apps/web/e2e/test-results
          retention-days: 14
          if-no-files-found: ignore

      - name: Detener Supabase local
        if: always()
        run: supabase stop

  # ===========================================================================
  # Rendimiento: se ejecuta SOLO si checks y e2e pasaron. Construye el build de
  # producción, verifica el presupuesto de bundle y audita Core Web Vitals con
  # Lighthouse. Si el score de performance/accessibility (o el bundle) no cumple
  # los umbrales, este job FALLA y, como `deploy` depende de él, se bloquea el
  # despliegue. No repite type-check/lint/vitest/playwright (ya cubiertos).
  # No requiere secretos: audita páginas públicas con un build local.
  # ===========================================================================
  performance:
    name: Rendimiento (build + bundle + Lighthouse)
    runs-on: ubuntu-latest
    needs: [checks, e2e]
    timeout-minutes: 20
    # Variables públicas de placeholder: el build necesita una URL válida para
    # derivar el host de imágenes; auditamos /login y /register (públicas) que no
    # consumen datos, así que no hacen falta credenciales reales ni Supabase.
    env:
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-placeholder
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      BUNDLE_BUDGET_KB: "300"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Restaurar caché de Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Fijar la versión de npm (coincide con packageManager)
        run: npm install -g npm@${{ env.NPM_VERSION }}

      - name: Instalar dependencias (npm workspaces)
        run: npm ci

      # Genera el Production Build y captura su salida (tabla "First Load JS")
      # para el reporte/gate de bundle. pipefail asegura que un fallo del build
      # (no de tee) marque el paso como fallido.
      - name: Generar Production Build
        working-directory: apps/web
        run: |
          set -o pipefail
          npm run build 2>&1 | tee "$RUNNER_TEMP/build-output.txt"

      # Gate de bundle: falla si la ruta más pesada supera BUNDLE_BUDGET_KB.
      - name: Analizar tamaño del bundle (gate + reporte)
        working-directory: apps/web
        run: node scripts/bundle-report.mjs "$RUNNER_TEMP/build-output.txt" "$RUNNER_TEMP/bundle-report.md"

      # Levanta el build de producción y audita Core Web Vitals con Lighthouse
      # CI. Las aserciones (lighthouserc.json) fallan el paso si performance o
      # accessibility caen por debajo de 0.90 (o CLS > 0.1).
      - name: Auditoría de Core Web Vitals (Lighthouse) — gate
        working-directory: apps/web
        run: |
          set -o pipefail
          npm run start &
          SERVER_PID=$!
          for i in $(seq 1 60); do
            curl -sf http://localhost:3000/login >/dev/null 2>&1 && break
            sleep 1
          done
          npx @lhci/cli@0.15.1 autorun
          STATUS=$?
          kill "$SERVER_PID" 2>/dev/null || true
          exit $STATUS

      # Reporte de rendimiento como artefacto (bundle + Lighthouse), incluso si
      # el gate falló, para poder inspeccionar los números.
      - name: Publicar reporte de rendimiento (artefacto)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-report
          path: |
            ${{ runner.temp }}/bundle-report.md
            ${{ runner.temp }}/build-output.txt
            apps/web/lighthouse-report
          retention-days: 14
          if-no-files-found: ignore

  # ===========================================================================
  # Despliegue a Vercel: SOLO tras aprobar checks + e2e + performance. Despliega
  # a producción en push a main y crea un preview en Pull Requests. Si aún no se
  # configuraron los secretos de Vercel, el job NO falla: detecta su ausencia y
  # omite el despliegue con un aviso (para no bloquear el PR antes del setup).
  # Secretos requeridos (GitHub → Settings → Secrets → Actions):
  #   VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
  # Las variables de entorno de la app (Supabase/Voyage/Anthropic) se configuran
  # en el proyecto de Vercel, NO aquí.
  # ===========================================================================
  deploy:
    name: Despliegue a Vercel
    runs-on: ubuntu-latest
    needs: [performance]
    timeout-minutes: 15
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      # Sin secretos configurados => se omite el deploy (el job queda en verde).
      - name: Verificar configuración de Vercel
        id: check
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Secretos de Vercel ausentes; se omite el despliegue. Configúralos para activarlo."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Instalar Vercel CLI
        if: steps.check.outputs.configured == 'true'
        run: npm install -g vercel@latest

      # Se despliega con build REMOTO en Vercel (no `vercel build --prebuilt`):
      # el pipeline de Vercel resuelve correctamente el monorepo (npm workspaces
      # + Root Directory = apps/web) y usa las variables de entorno del proyecto.
      # production en push a main/master; preview en Pull Requests.
      - name: Desplegar a Vercel
        if: steps.check.outputs.configured == 'true'
        run: |
          FLAG=${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && '--prod' || '' }}
          URL=$(vercel deploy $FLAG --yes --token="$VERCEL_TOKEN")
          echo "Desplegado en: $URL"
          echo "### 🚀 Despliegue Vercel" >> "$GITHUB_STEP_SUMMARY"
          echo "$URL" >> "$GITHUB_STEP_SUMMARY"
